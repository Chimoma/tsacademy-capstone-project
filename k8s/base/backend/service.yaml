apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: taskapp
spec:
  selector:
    app: backend
  ports:
    - port: 80          # Service listens on port 80
      targetPort: 5000  # Forwards to Flask's port 5000
  # ClusterIP means only accessible inside the cluster
  # The Ingress controller (Phase 6) will route external traffic here